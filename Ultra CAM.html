<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeChat Style Chat Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .header {
      background: #07c160;
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h2 {
      font-size: 20px;
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
    }

    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #e5ddd5;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 15px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .received {
      align-self: flex-start;
      background: white;
      border-bottom-left-radius: 5px;
    }

    .sent {
      align-self: flex-end;
      background: #95ec69;
      border-bottom-right-radius: 5px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #f7f7f7;
      border-top: 1px solid #ddd;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 25px;
      outline: none;
      font-size: 14px;
    }

    .input-area button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 25px;
      background: #07c160;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .input-area button:hover {
      background: #05a14f;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px 0;
      border-top: 1px solid #ddd;
    }

    .nav-item {
      text-align: center;
      font-size: 12px;
      color: #555;
      cursor: pointer;
    }

    .nav-item.active {
      color: #07c160;
      font-weight: bold;
    }

    @media(max-width: 500px) {
      .app {
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <h2>Ultra Chat</h2>
      <div class="status">Online</div>
    </div>
    <div>⋮</div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message received">Hello 👋</div>
    <div class="message sent">Hi! Welcome to Ultra Chat.</div>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">💬<br>Chats</div>
    <div class="nav-item">👥<br>Contacts</div>
    <div class="nav-item">🔍<br>Discover</div>
    <div class="nav-item">⚙️<br>Me</div>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const messageInput = document.getElementById('messageInput');

  function sendMessage() {
    const message = messageInput.value.trim();

    if (message === '') return;

    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', 'sent');
    msgDiv.textContent = message;

    chatBox.appendChild(msgDiv);
    messageInput.value = '';

    chatBox.scrollTop = chatBox.scrollHeight;

    setTimeout(() => {
      const reply = document.createElement('div');
      reply.classList.add('message', 'received');
      reply.textContent = 'Received: ' + message;

      chatBox.appendChild(reply);
      chatBox.scrollTop = chatBox.scrollHeight;
    }, 800);
  }

  messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      sendMessage();
    }
  });
</script>

</body>
</html>
